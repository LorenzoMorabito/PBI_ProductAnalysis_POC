name: Repo Health PR Validation

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  repo-health-pr:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore repo health history cache
        uses: actions/cache/restore@v4
        with:
          path: .repo-health/outputs/history
          key: repo-health-history-${{ github.base_ref }}-${{ github.run_id }}
          restore-keys: |
            repo-health-history-${{ github.base_ref }}-
            repo-health-history-main-

      - name: Run repository health analyzer
        shell: pwsh
        run: |
          ./.repo-health/analyzer.ps1 `
            -Mode pr `
            -FailOnThresholdBreach

      - name: Append summary to workflow run
        if: always()
        shell: pwsh
        run: |
          Get-Content ./.repo-health/outputs/current/summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload repo health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-pr-${{ github.event.pull_request.number }}
          path: .repo-health/outputs

      - name: Comment PR with repo health summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '.repo-health/outputs/current/summary.md';
            const marker = '<!-- repo-health-comment -->';
            const body = `${marker}\n${fs.readFileSync(summaryPath, 'utf8')}`;
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
